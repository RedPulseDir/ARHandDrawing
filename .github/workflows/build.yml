name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          pkg-config \
          libltdl-dev \
          unzip \
          zip \
          lld \
          ccache \
          cmake \
          ninja-build
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install buildozer==1.5.0 cython==0.29.36
    
    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log || true
    
    - name: Show build directory
      if: always()
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        echo ""
        echo "=== Bin directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"
        echo ""
        echo "=== .buildozer directory ==="
        ls -la .buildozer/ 2>/dev/null || echo ".buildozer/ not found"
        echo ""
        echo "=== Last 100 lines of build log ==="
        tail -100 build.log 2>/dev/null || echo "No build.log"
    
    - name: Find APK files
      if: always()
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: APK
        path: bin/*.apk
        if-no-files-found: warn
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: warn
