name: Build AR Hand Drawing APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-broken
        sudo apt-get install -y \
          build-essential \
          git \
          python3-pip \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          pkg-config \
          unzip \
          zip \
          ccache \
          cmake \
          libunwind-dev
        
        pip install --upgrade pip setuptools wheel
        pip install buildozer==1.5.0 cython==0.29.33
    
    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin
        yes | buildozer android debug 2>&1 | tee build.log
      timeout-minutes: 60
    
    - name: Find APK
      if: always()
      run: |
        echo "=== Searching for APK ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "=== Bin directory ==="
        ls -la bin/ 2>/dev/null || echo "No bin directory"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AR-Hand-Drawing-APK
        path: bin/*.apk
        if-no-files-found: warn
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: warn
